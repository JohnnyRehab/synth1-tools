<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Synth1 .sy1 → JSON Converter</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: #111;
  color: #eee;
  padding: 20px;
}

.container {
  max-width: 900px;
  margin: auto;
}

h1 {
  font-size: 22px;
}

button {
  background: #333;
  color: white;
  border: none;
  padding: 10px 14px;
  margin-right: 8px;
  border-radius: 6px;
  cursor: pointer;
}

button:hover {
  background: #555;
}

pre {
  background: #000;
  padding: 15px;
  border-radius: 6px;
  overflow: auto;
  max-height: 500px;
}

input[type="file"] {
  margin: 20px 0;
}

.footer {
  margin-top: 20px;
  opacity: 0.6;
  font-size: 12px;
}
</style>

</head>

<body>
<div class="container">

<h1>🎹 Synth1 .sy1 → JSON Converter</h1>

<p>
Synth1 の <code>.sy1</code> パッチファイルを読み込み、JSONへ変換します。<br>
パラメーター名にも対応しています。
</p>

<input type="file" id="file" accept=".sy1">

<div>
<button id="download">Download JSON</button>
<button id="clear">Clear</button>
</div>

<h3>Output</h3>
<pre id="output"></pre>

<div class="footer">
Synth1 patch converter (local only)
</div>

</div>

<script>

let currentJson = null;

// Synth1 Parameter Map (partial / extendable)

const PARAM_NAMES = {
  0: "osc1_shape",
  1: "osc2_shape",
  2: "osc2_pitch",
  3: "osc2_fine",
  4: "osc2_kbd_track",
  5: "osc_mix",
  6: "osc2_sync",
  7: "osc2_ring",
  8: "osc_pulse_width",
  9: "osc_key_shift",
  10: "osc_mod_env_on",
  11: "osc_mod_env_amount",
  12: "osc_mod_env_attack",
  13: "osc_mod_env_decay",
  14: "filter_type",
  15: "filter_attack",
  16: "filter_decay",
  17: "filter_sustain",
  18: "filter_release",
  19: "filter_cutoff",
  20: "filter_resonance",
  21: "filter_env_amount",
  22: "filter_kbd_track",
  23: "filter_saturation",
  24: "filter_velocity",
  25: "amp_attack",
  26: "amp_decay",
  27: "amp_sustain",
  28: "amp_release",
  29: "amp_gain",
  30: "amp_velocity",
  31: "arp_type",
  32: "arp_octave",
  33: "arp_beat",
  34: "arp_gate",
  35: "delay_time",
  36: "delay_feedback",
  37: "delay_mix",
  38: "play_mode",
  39: "portamento_time",
  40: "pitch_bend_range",
  41: "lfo1_destination",
  42: "lfo1_type",
  43: "lfo1_speed",
  44: "lfo1_depth",
  45: "osc1_fm",
  46: "lfo2_destination",
  47: "lfo2_type",
  48: "lfo2_speed",
  49: "lfo2_depth",
  50: "midi_ctrl_sens1",
  51: "midi_ctrl_sens2",
  52: "chorus_delay",
  53: "chorus_depth",
  54: "chorus_rate",
  55: "chorus_feedback",
  56: "chorus_level",
  57: "lfo1_on",
  58: "lfo2_on",
  59: "arp_on",
  60: "eq_tone",
  61: "eq_freq",
  62: "eq_level",
  63: "eq_q",
  64: "chorus_type",
  65: "delay_on",
  66: "chorus_on",
  67: "lfo1_sync",

  71: "osc_mod_dest",

  74: "portamento_auto",
  75: "unison_detune",
  76: "osc1_detune",
  77: "fx_on",
  78: "fx_type",
  79: "fx_param1",
  80: "fx_param2",
  81: "fx_mix",
  82: "delay_type",
  83: "delay_spread",
  84: "unison_pan",
  85: "unison_pitch",
  86: "midi_src1",
  87: "midi_assign1",
  88: "midi_src2",
  89: "midi_assign2",
  90: "pan",
  91: "osc_phase",
  92: "unison_phase",
  93: "unison_voices",
  94: "polyphony",
  95: "sub_osc_gain",
  96: "sub_osc_shape",
  97: "sub_osc_octave",
  98: "delay_tone"
};


// ファイル読み込み

document.getElementById("file").addEventListener("change", async (e) => {

  const file = e.target.files[0];
  if (!file) return;

  const text = await file.text();

  try {
    const json = parseSY1(text);
    currentJson = json;

    document.getElementById("output").textContent = 
      JSON.stringify(json, null, 2);

  } catch (err) {
    document.getElementById("output").textContent = 
      "Error: " + err.message;
  }

});


// .sy1 parser

function parseSY1(text) {

  const lines = text.split(/\r?\n/);

  if (lines.length < 3) {
    throw new Error("Invalid sy1 file");
  }

  const result = {
    name: lines[0]?.trim() || "",
    color: (lines[1]?.includes("=") ? lines[1].split("=")[1] : lines[1])?.trim() || "",
    version: (lines[2]?.includes("=") ? lines[2].split("=")[1] : lines[2])?.trim() || "",
    params: {},
    named: {}
  };

  for (let i = 3; i < lines.length; i++) {

    const line = lines[i].trim();

    if (!line) continue;

    const parts = line.split(",");

    if (parts.length !== 2) continue;

    const id = Number(parts[0].trim());
    const value = Number(parts[1].trim());

    if (!isNaN(value)) {
      result.params[id] = value;

      const name = PARAM_NAMES[id] || `param_${id}`;
      result.named[name] = value;
    }
  }

  return result;
}


// Download JSON

document.getElementById("download").addEventListener("click", () => {

  if (!currentJson) return;

  const blob = new Blob(
    [JSON.stringify(currentJson, null, 2)],
    { type: "application/json" }
  );

  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "patch.json";
  a.click();

  URL.revokeObjectURL(url);
});


// Clear

document.getElementById("clear").addEventListener("click", () => {

  document.getElementById("output").textContent = "";
  document.getElementById("file").value = "";
  currentJson = null;

});


</script>

</body>
</html>
