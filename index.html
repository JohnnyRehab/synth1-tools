<!DOCTYPE html>

      color: #4fc3f7;
    }
   .subtitle {
      color: #888;
      margin-bottom: 32px;
      font-size: 14px;
    }
   .drop-zone {
      border: 3px dashed #444;
      border-radius: 12px;
      padding: 60px 20px;
      text-align: center;
      background: #252525;
      transition: all 0.3s;
      cursor: pointer;
    }
   .drop-zone:hover,.drop-zone.dragover {
      border-color: #4fc3f7;
      background: #2a2a2a;
    }
   .drop-zone p {
      font-size: 16px;
      margin-bottom: 16px;
    }
   .drop-zone input {
      display: none;
    }
   .btn {
      background: #4fc3f7;
      color: #000;
      border: none;
      padding: 12px 24px;
      border-radius: 6px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
   .btn:hover { opacity: 0.8; }
   .btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }
   .result {
      margin-top: 32px;
      display: none;
    }
   .result.show { display: block; }
   .meta {
      background: #252525;
      padding: 16px;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 14px;
    }
   .meta span {
      display: inline-block;
      margin-right: 20px;
      color: #aaa;
    }
   .meta strong { color: #4fc3f7; }
    pre {
      background: #0d0d0d;
      padding: 20px;
      border-radius: 8px;
      overflow-x: auto;
      font-size: 13px;
      border: 1px solid #333;
      max-height: 500px;
      overflow-y: auto;
    }
   .actions {
      margin-top: 16px;
      display: flex;
      gap: 12px;
    }
   .error {
      background: #3d1a1a;
      color: #ff6b6b;
      padding: 16px;
      border-radius: 8px;
      margin-top: 16px;
      display: none;
    }
   .error.show { display: block; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Synth1.sy1 →.json</h1>

        ファイルを選択
      </button>
      <input type="file" id="fileInput" accept=".sy1" multiple>
