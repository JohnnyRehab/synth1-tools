<script>// Playables SDK v1.0.0
// Game lifecycle bridge: rAF-based game-ready detection + event communication
(function() {
  'use strict';

  // Idempotency: skip if already initialized (e.g., server-side injection
  // followed by client-side inject-javascript via the Bloks webview component).
  if (window.playablesSDK) return;

  var HANDLER_NAME = 'playablesGameEventHandler';
  var ANDROID_BRIDGE_NAME = '_MetaPlayablesBridge';
  var RAF_FRAME_THRESHOLD = 3;

  var gameReadySent = false;
  var firstInteractionSent = false;
  var errorSent = false;
  var frameCount = 0;
  var originalRAF = window.requestAnimationFrame;

  // --- Transport Layer ---

  function hasIOSBridge() {
    return !!(window.webkit &&
              window.webkit.messageHandlers &&
              window.webkit.messageHandlers[HANDLER_NAME]);
  }

  function hasAndroidBridge() {
    return !!(window[ANDROID_BRIDGE_NAME] &&
              typeof window[ANDROID_BRIDGE_NAME].postEvent === 'function');
  }

  function isInIframe() {
    return !!(window.parent && window.parent !== window);
  }

  function sendEvent(eventName, payload) {
    var message = {
      type: eventName,
      payload: payload || {},
      timestamp: Date.now()
    };

    if (hasIOSBridge()) {
      try {
        window.webkit.messageHandlers[HANDLER_NAME].postMessage(message);
      } catch (e) { /* ignore */ }
      return;
    }

    if (hasAndroidBridge()) {
    try {
      var p = payload || {};
      p.__secureToken = window.__fbAndroidBridgeAuthToken || '';
      window[ANDROID_BRIDGE_NAME].postEvent(
        eventName,
        JSON.stringify(p)
      );
    } catch (e) { /* ignore */ }
    return;
  }

    if (isInIframe()) {
      try {
        window.parent.postMessage(message, '*');
      } catch (e) { /* ignore */ }
      return;
    }
  }

  // --- rAF Game-Ready Detection ---

  function onFrame() {
    if (gameReadySent) return;

    frameCount++;
    if (frameCount >= RAF_FRAME_THRESHOLD) {
      gameReadySent = true;
      sendEvent('game_ready', {
        frame_count: frameCount,
        detected_at: Date.now()
      });
      return;
    }

    originalRAF.call(window, onFrame);
  }

  if (originalRAF) {
    window.requestAnimationFrame = function(callback) {
      if (!gameReadySent) {
        return originalRAF.call(window, function(timestamp) {
          frameCount++;
          if (frameCount >= RAF_FRAME_THRESHOLD && !gameReadySent) {
            gameReadySent = true;
            sendEvent('game_ready', {
              frame_count: frameCount,
              detected_at: Date.now()
            });
          }
          callback(timestamp);
        });
      }
      return originalRAF.call(window, callback);
    };
  }

  // --- First User Interaction Detection ---

  function setupFirstInteractionDetection() {
    var events = ['touchstart', 'mousedown', 'keydown'];

    function onFirstInteraction() {
      if (firstInteractionSent) return;
      firstInteractionSent = true;
      sendEvent('user_interaction_start', null);

      for (var i = 0; i < events.length; i++) {
        document.removeEventListener(events[i], onFirstInteraction, true);
      }
    }

    for (var i = 0; i < events.length; i++) {
      document.addEventListener(events[i], onFirstInteraction, true);
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', setupFirstInteractionDetection);
  } else {
    setupFirstInteractionDetection();
  }

  // --- Auto Error Capture ---

  window.addEventListener('error', function(event) {
    if (errorSent) return;
    errorSent = true;
    sendEvent('error', {
      message: event.message || 'Unknown error',
      source: event.filename || '',
      lineno: event.lineno || 0,
      colno: event.colno || 0,
      auto_captured: true
    });
  });

  window.addEventListener('unhandledrejection', function(event) {
    if (errorSent) return;
    errorSent = true;
    var reason = event.reason;
    sendEvent('error', {
      message: (reason instanceof Error) ? reason.message : String(reason),
      type: 'unhandled_promise_rejection',
      auto_captured: true
    });
  });

  // --- Public API ---

  window.playablesSDK = {
    complete: function(score) {
      sendEvent('game_ended', {
        score: score,
        completed: true
      });
    },

    error: function(message) {
      if (errorSent) return;
      errorSent = true;
      sendEvent('error', {
        message: message || 'Unknown error',
        auto_captured: false
      });
    },

    sendEvent: function(eventName, payload) {
      if (!eventName || typeof eventName !== 'string') return;
      sendEvent(eventName, payload);
    }
  };

  // Kick off rAF detection in case no game code calls rAF immediately
  if (originalRAF) {
    originalRAF.call(window, onFrame);
  }
})();</script>
<script>window.Intl=window.Intl||{};Intl.t=function(s){return(Intl._locale&&Intl._locale[s])||s;};</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Synth1.sy1 →.json 変換ツール</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #1a1a1a;
      color: #e0e0e0;
      padding: 40px 20px;
      line-height: 1.6;
    }
   .container {
      max-width: 800px;
      margin: 0 auto;
    }
    h1 {
      font-size: 28px;
      margin-bottom: 8px;
      color: #4fc3f7;
    }
   .subtitle {
      color: #888;
      margin-bottom: 32px;
      font-size: 14px;
    }
   .drop-zone {
      border: 3px dashed #444;
      border-radius: 12px;
      padding: 60px 20px;
      text-align: center;
      background: #252525;
      transition: all 0.3s;
      cursor: pointer;
    }
   .drop-zone:hover,.drop-zone.dragover {
      border-color: #4fc3f7;
      background: #2a2a2a;
    }
   .drop-zone p {
      font-size: 16px;
      margin-bottom: 16px;
    }
   .drop-zone input {
      display: none;
    }
   .btn {
      background: #4fc3f7;
      color: #000;
      border: none;
      padding: 12px 24px;
      border-radius: 6px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
   .btn:hover { opacity: 0.8; }
   .btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }
   .result {
      margin-top: 32px;
      display: none;
    }
   .result.show { display: block; }
   .meta {
      background: #252525;
      padding: 16px;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 14px;
    }
   .meta span {
      display: inline-block;
      margin-right: 20px;
      color: #aaa;
    }
   .meta strong { color: #4fc3f7; }
    pre {
      background: #0d0d0d;
      padding: 20px;
      border-radius: 8px;
      overflow-x: auto;
      font-size: 13px;
      border: 1px solid #333;
      max-height: 500px;
      overflow-y: auto;
    }
   .actions {
      margin-top: 16px;
      display: flex;
      gap: 12px;
    }
   .error {
      background: #3d1a1a;
      color: #ff6b6b;
      padding: 16px;
      border-radius: 8px;
      margin-top: 16px;
      display: none;
    }
   .error.show { display: block; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Synth1.sy1 →.json</h1>
    <p class="subtitle">Synth1のパッチファイルをJSONに変換。バージョン自動判定対応</p>

    <div class="drop-zone" id="dropZone">
      <p>📁.sy1ファイルをドラッグ&ドロップ</p>
      <p style="font-size: 14px; color: #666;">または</p>
      <button class="btn" type="button" onclick="document.getElementById('fileInput').click()">
        ファイルを選択
      </button>
      <input type="file" id="fileInput" accept=".sy1" multiple>
    </div>

    <div class="error" id="error"></div>

    <div class="result" id="result">
      <div class="meta" id="meta"></div>
      <pre id="jsonOutput"></pre>
      <div class="actions">
        <button class="btn" id="downloadBtn">.jsonをダウンロード</button>
        <button class="btn" style="background: #666;" onclick="resetUI()">リセット</button>
      </div>
    </div>
  </div>

  <script>
    const PARAM_MAP_V1_13 = {
      0: "osc1_shape", 1: "osc2_shape", 2: "osc2_pitch", 3: "osc2_fine_tune",
      4: "osc2_kbd_track", 5: "osc_mix", 6: "osc2_sync", 7: "osc2_ring_mod",
      8: "osc_pulse_width", 9: "osc_key_shift", 10: "osc_mod_env_on_off",
      11: "osc_mod_env_amount", 12: "osc_mod_env_attack", 13: "osc_mod_env_decay",
      14: "filter_type", 15: "filter_attack", 16: "filter_decay", 17: "filter_sustain",
      18: "filter_release", 19: "filter_freq", 20: "filter_resonance", 21: "filter_amount",
      22: "filter_kbd_track", 23: "filter_saturation", 24: "filter_velocity_switch",
      25: "amp_attack", 26: "amp_decay", 27: "amp_sustain", 28: "amp_release",
      29: "amp_gain", 30: "amp_velocity_sens", 31: "arpeggiator_type", 32: "arpeggiator_oct_range",
      33: "arpeggiator_beat", 34: "arpeggiator_gate", 35: "delay_time", 36: "delay_feedback",
      37: "delay_dry_wet", 38: "play_mode_type", 39: "portament_time", 40: "pitch_bend_range",
      41: "lfo1_destination", 42: "lfo1_type", 43: "lfo1_speed", 44: "lfo1_depth",
      45: "osc1_FM", 46: "lfo2_destination", 47: "lfo2_type", 48: "lfo2_speed",
      49: "lfo2_depth", 50: "midi_ctrl_sens1", 51: "midi_ctrl_sens2", 52: "chorus_delay_time",
      53: "chorus_depth", 54: "chorus_rate", 55: "chorus_feedback", 56: "chorus_level",
      57: "lfo1_on_off", 58: "lfo2_on_off", 59: "arpeggiator_on_off", 60: "equalizer_tone",
      61: "equalizer_freq", 62: "equalizer_level", 63: "equalizer_Q", 64: "chorus_type",
      65: "delay_on_off", 66: "chorus_on_off", 67: "lfo1_tempo_sync", 68: "lfo1_key_sync",
      69: "lfo2_tempo_sync", 70: "lfo2_key_sync", 71: "osc_mod_dest", 72: "osc1_2_fine_tune",
      73: "unison_mode", 74: "portament_auto_mode", 75: "unison_detune", 76: "osc1_detune",
      77: "effect_on_off", 78: "effect_type", 79: "effect_control1", 80: "effect_control2",
      81: "effect_level_mix", 82: "delay_type", 83: "delay_time_spread", 84: "unison_pan_spread",
      85: "unison_pitch", 86: "midi_ctrl_src1", 87: "midi_ctrl_assign1", 88: "midi_ctrl_src2",
      89: "midi_ctrl_assign2", 90: "pan", 91: "osc_phase_shift", 92: "unison_phase_shift",
      93: "unison_voice_num", 94: "reserved_94", 95: "osc1_sub_gain", 96: "osc1_sub_shape",
      97: "osc1_sub_octave", 98: "delay_tone"
    };

    const VERSION_MAX_PARAM = {
      "v1.07": 64,
      "v1.10": 73,
      "v1.12": 92,
      "v1.13": 98
    };

    function detectVersion(versionStr) {
      if (!versionStr) return "v1.13";
      const v = versionStr.toLowerCase().trim();
      if (v.includes("1.13")) return "v1.13";
      if (v.includes("1.12")) return "v1.12";
      if (v.includes("1.10")) return "v1.10";
      if (v.includes("1.07")) return "v1.07";
      return "v1.13";
    }

    function parseSy1(text) {
      const lines = text.replace(/\r\n/g, "\n").split("\n").filter(l => l.trim()!=="");
      if (lines.length < 4) throw new Error("Invalid.sy1: 行数が少なすぎます");

      const patchName = lines[0].trim();
      const color = lines[1].trim();
      const versionRaw = lines[2].trim();
      const version = detectVersion(versionRaw);
      const maxParam = VERSION_MAX_PARAM[version]?? 98;

      const paramsRaw = {};
      for (let i = 3; i < lines.length; i++) {
        const [numStr, valStr] = lines[i].split(",");
        const num = parseInt(numStr, 10);
        const val = parseInt(valStr, 10);
        if (!isNaN(num) &&!isNaN(val)) {
          paramsRaw[num] = val;
        }
      }

      const params = {};
      for (let i = 0; i <= maxParam; i++) {
        const key = PARAM_MAP_V1_13[i] || `unknown_${i}`;
        params[key] = paramsRaw[i]?? null;
      }

      return {
        meta: {
          name: patchName,
          color: color,
          version: versionRaw,
          detectedVersion: version
        },
        parameters: params,
        raw: paramsRaw
      };
    }

    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const result = document.getElementById('result');
    const meta = document.getElementById('meta');
    const jsonOutput = document.getElementById('jsonOutput');
    const downloadBtn = document.getElementById('downloadBtn');
    const errorDiv = document.getElementById('error');
    let currentJson = null;
    let currentFilename = 'patch.json';

    dropZone.addEventListener('dragover', e => {
      e.preventDefault();
      dropZone.classList.add('dragover');
    });
    dropZone.addEventListener('dragleave', () => {
      dropZone.classList.remove('dragover');
    });
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('dragover');
      handleFiles(e.dataTransfer.files);
    });
    fileInput.addEventListener('change', e => handleFiles(e.target.files));

    function handleFiles(files) {
      if (files.length === 0) return;
      const file = files[0];
      if (!file.name.endsWith('.sy1')) {
        showError('.sy1ファイルを選択してください');
        return;
      }

      currentFilename = file.name.replace(/\.sy1$/i, '.json');
      const reader = new FileReader();
      reader.onload = e => {
        try {
          currentJson = parseSy1(e.target.result);
          showResult(currentJson);
          hideError();
        } catch (err) {
          showError(`変換エラー: ${err.message}`);
        }
      };
      reader.readAsText(file);
    }

    function showResult(data) {
      meta.innerHTML = `
        <span>パッチ名: <strong>${data.meta.name}</strong></span>
        <span>バージョン: <strong>${data.meta.detectedVersion}</strong></span>
        <span>カラー: <strong>${data.meta.color}</strong></span>
      `;
      jsonOutput.textContent = JSON.stringify(data, null, 2);
      result.classList.add('show');
    }

    function showError(msg) {
      errorDiv.textContent = msg;
      errorDiv.classList.add('show');
      result.classList.remove('show');
    }

    function hideError() {
      errorDiv.classList.remove('show');
    }

    function resetUI() {
      result.classList.remove('show');
      hideError();
      fileInput.value = '';
      currentJson = null;
    }

    downloadBtn.addEventListener('click', () => {
      if (!currentJson) return;
      const blob = new Blob([JSON.stringify(currentJson, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = currentFilename;
      a.click();
      URL.revokeObjectURL(url);
    });
  </script>
</body>
</html>
